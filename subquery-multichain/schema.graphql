type Event @entity {
  id: ID!
  transaction: Transaction!
  emitter: Account!
  timestamp: BigInt!
}

type Account @entity {
  id: ID!
  timestamp: BigInt
  balance: BigInt @index
  bridgeWithdrawalsAsSender: [BridgeWithdrawal!]! @derivedFrom(field: "sender")
  bridgeWithdrawalsAsReceiver: [BridgeWithdrawal!]!
    @derivedFrom(field: "receiver")
  bridgeDepositsAsSender: [BridgeDeposit!]! @derivedFrom(field: "sender")
  bridgeDepositsAsReceiver: [BridgeDeposit!]! @derivedFrom(field: "receiver")
  bridgeFailedDepositClaimsAsReceiver: [BridgeFailedDepositClaim!]!
    @derivedFrom(field: "receiver")
  events: [Event!]! @derivedFrom(field: "emitter")
}

type Transaction @entity {
  id: ID!
  timestamp: BigInt!
  blockNumber: BigInt!
  events: [Event!]! @derivedFrom(field: "transaction")
}

# Bridge

type BridgeWithdrawal implements Event @entity {
  id: ID!
  emitter: Account!
  transaction: Transaction!
  timestamp: BigInt! @index
  sender: Account! @index
  receiver: Account! @index
  amount: BigInt!
  hash: String
  l1TransactionHash: String @index
  l2TransactionHash: String! @index
  l1TransactionId: String
  l2TransactionId: String
  status: String! @index
  l2BlockNumber: BigInt! @index
  batchNumber: BigInt
  messageIndex: BigInt
  txNumberInBatch: BigInt
  finalizedAt: BigInt
  finalizedTransaction: Transaction
}

type BridgeDeposit implements Event @entity {
  id: ID!
  emitter: Account!
  transaction: Transaction!
  timestamp: BigInt! @index
  sender: Account! @index
  receiver: Account! @index
  amount: BigInt!
  hash: String @index
  l1TransactionHash: String @index
  l2TransactionHash: String @index
  l1TransactionId: String
  l2TransactionId: String
}

type BridgeFailedDepositClaim implements Event @entity {
  id: ID!
  emitter: Account!
  transaction: Transaction!
  timestamp: BigInt! @index
  receiver: Account! @index
  amount: BigInt!
}

